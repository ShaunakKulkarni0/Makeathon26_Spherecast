<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spherecast - Material Substitute Finder</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Spherecast Material Substitute Finder</h1>
            <p>AI-powered material substitution with 5D scoring</p>
        </header>

        <main class="main-content">
            <div id="search-section" class="search-section search-with-panel">
                <div class="search-panel">
                    <h2>Find Material Substitutes</h2>
                    <div id="search-form-container"></div>
                </div>
                <aside class="weight-panel-wrapper">
                    <div id="weight-controls-container"></div>
                </aside>
            </div>

            <div id="results-section" class="results-section hidden">
                <div class="results-header">
                    <h2>Substitution Results</h2>
                </div>

                <div class="results-content">
                    <div id="original-material-container"></div>
                    <div id="top-candidates-container"></div>
                    <div id="rejected-candidates-container"></div>
                </div>
            </div>

            <div id="comparison-section" class="comparison-section hidden">
                <div id="comparison-view-container"></div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 TUM.ai Makeathon - Spherecast Team</p>
        </footer>
    </div>

    <!-- Load JavaScript modules -->
    <script type="module" src="utils/api.js"></script>
    <script type="module" src="components/SearchForm.js"></script>
    <script type="module" src="components/WeightSliders.js"></script>
    <script type="module" src="components/CandidateCard.js"></script>
    <script type="module" src="components/ResultsList.js"></script>
    <script type="module" src="components/ScoreBreakdown.js"></script>
    <script type="module" src="components/ComparisonView.js"></script>
    <script type="module" src="components/RejectedList.js"></script>

    <!-- Main app script -->
    <script type="module">
        import { API } from './utils/api.js';
        import { SearchForm } from './components/SearchForm.js';
        import { WeightSliders } from './components/WeightSliders.js';
        import { ResultsList } from './components/ResultsList.js';
        import { ComparisonView } from './components/ComparisonView.js';
        import { RejectedList } from './components/RejectedList.js';

        class App {
            constructor() {
                this.api = new API();
                this.currentResult = null;
                this.currentWeights = {
                    spec_similarity: 0.40,
                    compliance: 0.25,
                    price_delta: 0.15,
                    lead_time: 0.10,
                    quality_signals: 0.10
                };
                this.initializeComponents();
            }

            initializeComponents() {
                // Initialize search form
                const searchContainer = document.getElementById('search-form-container');
                this.searchForm = new SearchForm(searchContainer, this.handleSearch.bind(this));

                // Initialize weight sliders
                const weightContainer = document.getElementById('weight-controls-container');
                this.weightSliders = new WeightSliders(weightContainer, this.handleWeightsChange.bind(this));

                // Initialize results containers
                this.resultsList = new ResultsList(
                    document.getElementById('top-candidates-container'),
                    this.handleCandidateSelect.bind(this)
                );

                this.rejectedList = new RejectedList(
                    document.getElementById('rejected-candidates-container')
                );

                this.comparisonView = new ComparisonView(
                    document.getElementById('comparison-view-container')
                );
            }

            async handleSearch(query) {
                try {
                    this.showLoading();
                    const result = await this.api.searchMaterials(query);
                    this.currentResult = result;
                    this.currentWeights = result.metadata?.weights ?? this.currentWeights;
                    this.displayResults(result);
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            async handleWeightsChange(weights) {
                if (!this.currentResult) return;

                this.currentWeights = { ...weights };
                try {
                    this.showLoading();
                    const rescoredResult = this.rescoreCurrentResults(weights);
                    this.currentResult = rescoredResult;
                    this.displayResults(rescoredResult);
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            handleCandidateSelect(candidate) {
                this.comparisonView.showComparison(this.currentResult.original, candidate, this.currentWeights);
                this.showComparisonSection();
            }

            displayResults(result) {
                // Display original material
                this.displayOriginalMaterial(result.original);

                // Display top candidates
                this.resultsList.setCandidates(result.top_candidates);
                this.resultsList.displayCandidates(result.top_candidates);

                // Display rejected candidates
                this.rejectedList.displayRejected(result.rejected);

                // Update weight sliders with current weights
                const activeWeights = result.metadata?.weights ?? this.currentWeights;
                this.weightSliders.setWeights(activeWeights);

                this.showResultsSection();
            }

            rescoreCurrentResults(weights) {
                const topCandidates = (this.currentResult?.top_candidates || []).map(candidate => {
                    const scores = candidate.scores || {};
                    const compositeScore = Object.entries(weights).reduce((sum, [key, weight]) => {
                        return sum + (scores[key] || 0) * weight;
                    }, 0);

                    return {
                        ...candidate,
                        composite_score: compositeScore,
                        rank: 0
                    };
                });

                topCandidates.sort((a, b) => b.composite_score - a.composite_score);
                topCandidates.forEach((candidate, index) => {
                    candidate.rank = index + 1;
                });

                const updatedMetadata = {
                    ...this.currentResult.metadata,
                    weights: { ...weights }
                };

                return {
                    ...this.currentResult,
                    top_candidates: topCandidates,
                    metadata: updatedMetadata
                };
            }

            displayOriginalMaterial(material) {
                const container = document.getElementById('original-material-container');
                container.innerHTML = `
                    <div class="original-material">
                        <h3>Original Material</h3>
                        <div class="material-card original">
                            <h4>${material.name}</h4>
                            <div class="material-details">
                                <p><strong>ID:</strong> ${material.id}</p>
                                <p><strong>Price:</strong> ${material.price.value} ${material.price.unit}</p>
                                <p><strong>Lead Time:</strong> ${material.lead_time.days} days</p>
                                <p><strong>MOQ:</strong> ${material.moq}</p>
                                <p><strong>Certifications:</strong> ${material.certifications.join(', ') || 'None'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            showResultsSection() {
                document.getElementById('search-section').classList.add('hidden');
                document.getElementById('results-section').classList.remove('hidden');
                document.getElementById('comparison-section').classList.add('hidden');
            }

            showComparisonSection() {
                document.getElementById('comparison-section').classList.remove('hidden');
            }

            showLoading() {
                // Add loading overlay
                const overlay = document.createElement('div');
                overlay.className = 'loading-overlay';
                overlay.innerHTML = '<div class="spinner"></div><p>Analyzing materials...</p>';
                document.body.appendChild(overlay);
            }

            hideLoading() {
                const overlay = document.querySelector('.loading-overlay');
                if (overlay) overlay.remove();
            }

            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.innerHTML = `<p>Error: ${message}</p>`;
                document.body.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 5000);
            }
        }

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
</html>
